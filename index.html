<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" src="music.mp3"></audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<h1 class="fade">Loading your birthday wishes... 🎁</h1>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h2>A cutie pie born on 🎂</h2>
<h1 id="birth"></h1>
<h2 id="age"></h2>
<button onclick="nextPage(3)">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<h1>Start the Surprise 🎉</h1>
<button onclick="start()">Start</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">

<div id="flags">🎉🎊🎉🎊🎉</div>

<div class="cake">
<div class="candle" id="candle"></div>
<div class="flame" id="flame">🔥</div>
</div>

<button onclick="decorate()">Decorate 🎀</button>
<button onclick="lightCandle()">Light Candle 🕯️</button>
<button onclick="showBalloons()">Pop Balloons 🎈</button>

<div id="balloons"></div>

<button onclick="nextPage(5)">Open My Message 💌</button>

</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
<h1 class="glow">✨ Happy Birthday 🎂 ✨</h1>
<button onclick="nextPage(6)">Next</button>
</div>

<!-- PAGE 6 -->
<div class="page" id="page6">
<h2>Wish you a lot of love ❤️ as friends</h2>
</div>

<script src="script.js"></script>
</body>
</html>
